services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobagent}
      POSTGRES_DB: ${POSTGRES_DB:-jobagent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./prompts:/app/prompts
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/playwright.Dockerfile
    env_file:
      - .env
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
      - ./browser:/app/browser
      - ./shared:/app/shared
      - ./prompts:/app/prompts
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.app.celery_app worker --loglevel=INFO

  scheduler:
    build:
      context: .
      dockerfile: docker/playwright.Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    command: python -m worker.scheduler

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  frontend_node_modules:
  elasticsearch_data:
